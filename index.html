<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预测长大的你</title>
    <style>
        :root {
            --primary-color: #ff4757;
            --overlay: rgba(0, 0, 0, 0.4);
            --error-glow: rgba(255, 71, 87, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }

        /* 背景幻灯片 */
        .slideshow {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .slide.active { opacity: 1; }

        /* 统一容器 */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--overlay);
            color: white;
            text-align: center;
        }

        h1 { font-size: 2.5rem; margin-bottom: 2rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        .form-group {
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            width: 350px;
            transition: all 0.3s;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 5px;
            border: 2px solid transparent;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }

        /* 闪烁动画 */
        @keyframes error-blink {
            0% { border-color: var(--primary-color); box-shadow: 0 0 5px var(--error-glow); }
            50% { border-color: transparent; box-shadow: none; }
            100% { border-color: var(--primary-color); box-shadow: 0 0 5px var(--error-glow); }
        }

        .error-active {
            animation: error-blink 0.6s ease-in-out infinite;
            border: 2px solid var(--primary-color) !important;
        }

        /* 年龄组件 */
        .age-control {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .btn-age {
            background: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 8px;
        }
        .btn-age:hover { background: #eee; }

        /* 快捷姓名按钮 */
        .name-quick {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
        }
        .quick-name {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 5px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .quick-name:hover {
            background: var(--primary-color);
            transform: scale(0.96);
        }

        .confirm-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 1.1rem;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .confirm-btn:hover { transform: scale(1.05); }

        /* 预览界面 */
        #preview-page { display: none; }

        /* 进度条 */
        .loader-container {
            width: 300px;
            height: 20px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }
        .loader-bar {
            height: 100%;
            width: 0%;
            background: #2ed573;
            transition: width 0.5s linear;
        }

        #result-photo {
            margin-top: 30px;
            max-width: 80%;
            max-height: 500px;
            border: 5px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
            display: none;
        }

        .tip { 
            color: #ff6b81; 
            font-weight: bold; 
            margin-top: 8px; 
            font-size: 0.9rem;
            display: none; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* 重新生成按钮 */
        .regenerate-btn {
            background: rgba(0,0,0,0.7);
            color: white;
            border: 1px solid white;
            padding: 8px 24px;
            font-size: 1rem;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.2s;
        }
        .regenerate-btn:hover {
            background: var(--primary-color);
            transform: scale(1.02);
        }
    </style>
</head>
<body>

<div class="slideshow" id="slideshow">
    <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=1200')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=1200')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=1200')"></div>
</div>

<div class="container" id="login-page">
    <h1>快来看看长大的你是什么模样吧！</h1>
    
    <div class="form-group">
        <label>你的姓名</label>
        <input type="text" id="nameInput" placeholder="请输入姓名">
        <div class="name-quick">
            <span class="quick-name" data-name="鸡">🐔 鸡</span>
            <span class="quick-name" data-name="狗">🐕 狗</span>
            <span class="quick-name" data-name="鸟">🐦 鸟</span>
        </div>
        <div id="nameError" class="tip">该姓名已被他人使用</div>
    </div>

    <div class="form-group">
        <label>你的年龄</label>
        <div class="age-control">
            <button class="btn-age" id="ageMinus">-</button>
            <input type="text" id="ageInput" value="18">
            <button class="btn-age" id="agePlus">+</button>
        </div>
        <div id="ageError" class="tip">该年龄已被他人使用</div>
    </div>

    <div class="form-group">
        <label>你的民族</label>
        <select id="nationSelect"></select>
        <div id="nationError" class="tip">该民族已被他人使用</div>
    </div>

    <button class="confirm-btn" id="confirmBtn">确定</button>
</div>

<div class="container" id="preview-page">
    <h1>快来看看长大的你是什么模样吧！</h1>
    
    <div id="loading-box">
        <p id="status-text">正在分析...</p>
        <div class="loader-container">
            <div class="loader-bar" id="loaderBar"></div>
        </div>
    </div>

    <img src="" id="result-photo" alt="长大的你">
    <button class="regenerate-btn" id="regenerateBtn">重新生成</button>
</div>

<script>
    // ---------- 1. 初始化民族下拉框 (None族 + 56民族 + 动物) ----------
    const baseNations = [
        "None族", "汉族", "蒙古族", "回族", "藏族", "维吾尔族", "苗族", "彝族", "壮族",
        "布依族", "朝鲜族", "满族", "侗族", "瑶族", "白族", "土家族", "哈尼族", "哈萨克族",
        "傣族", "黎族", "傈僳族", "佤族", "畲族", "高山族", "拉祜族", "水族", "东乡族",
        "纳西族", "景颇族", "柯尔克孜族", "土族", "达斡尔族", "仫佬族", "羌族", "布朗族",
        "撒拉族", "毛南族", "仡佬族", "锡伯族", "阿昌族", "普米族", "塔吉克族", "怒族",
        "乌孜别克族", "俄罗斯族", "鄂温克族", "德昂族", "保安族", "裕固族", "京族",
        "塔塔尔族", "独龙族", "鄂伦春族", "赫哲族", "门巴族", "珞巴族", "基诺族"
    ];
    const nationsWithAnimal = [...baseNations];
    nationsWithAnimal.splice(1, 0, "动物");  // 在None族后面插入“动物”
    
    const nationSelect = document.getElementById('nationSelect');
    nationsWithAnimal.forEach(n => {
        const opt = document.createElement('option');
        opt.value = n;
        opt.textContent = n;
        nationSelect.appendChild(opt);
    });
    nationSelect.value = "None族";

    // ---------- 2. 背景轮播 ----------
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    setInterval(() => {
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].classList.add('active');
    }, 5000);

    // ---------- 3. 年龄加减逻辑 ----------
    const ageInput = document.getElementById('ageInput');
    const ageMinus = document.getElementById('ageMinus');
    const agePlus = document.getElementById('agePlus');

    function changeAge(step) {
        let val = ageInput.value.trim();
        let num = parseInt(val, 10);
        if (isNaN(num)) num = 0;
        let newVal = num + step;
        if (newVal < 0) newVal = 0;
        ageInput.value = newVal;
    }
    ageMinus.addEventListener('click', () => changeAge(-1));
    agePlus.addEventListener('click', () => changeAge(1));

    // ---------- 4. 快捷姓名 ----------
    const nameInput = document.getElementById('nameInput');
    const quickBtns = document.querySelectorAll('.quick-name');
    quickBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const animal = btn.getAttribute('data-name');
            nameInput.value = animal;
        });
    });

    // ---------- 5. 照片库 (完全由开发者指定) ----------
    const PHOTO_CHICKEN = "chicken.png";
    const PHOTO_DOG = "dog.png";
    const PHOTO_BIRD = "bird.png";
    const PHOTO_NULL_IDENTITY = "Profile.png";

    // ---------- 6. 新验证逻辑: 依次检测姓名 → 年龄 → 民族 ----------
    function validateAndSubmit() {
        const name = nameInput.value;          // 原始字符串
        const age = ageInput.value;            // 原始字符串 (可能是 "17" 或 "null" 等)
        const nation = nationSelect.value;

        // 获取DOM元素
        const nameError = document.getElementById('nameError');
        const ageError = document.getElementById('ageError');
        const nationError = document.getElementById('nationError');
        const nameField = nameInput;
        const ageField = ageInput;
        const nationField = nationSelect;

        // 重置所有错误样式和提示
        [nameField, ageField, nationField].forEach(el => el.classList.remove('error-active'));
        [nameError, ageError, nationError].forEach(el => el.style.display = 'none');

        // ----- 定义有效组合的预期值 -----
        // 组合A: 姓名 ∈ {"鸡","狗","鸟"} , 年龄数字 = 17 , 民族 = "动物"
        // 组合B: 姓名 = "" (空字符串) , 年龄字符串 = "null" , 民族 = "None族"
        
        // 第一步: 校验姓名
        const isValidNameForA = (name === "鸡" || name === "狗" || name === "鸟");
        const isValidNameForB = (name === "");
        const isNameValid = isValidNameForA || isValidNameForB;
        
        if (!isNameValid) {
            // 姓名无效 → 显示姓名错误并终止
            nameField.classList.add('error-active');
            nameError.style.display = 'block';
            return;
        }
        
        // 第二步: 根据姓名校验年龄
        let isAgeValid = false;
        if (isValidNameForA) {
            // 组合A要求年龄为数字 17 (字符串 "17" 或数字17)
            const ageNum = parseInt(age, 10);
            // 必须严格等于17，且原始值不能是空或者"null"这样的非数字字符串
            isAgeValid = (!isNaN(ageNum) && ageNum === 17 && age.trim() !== "" && age !== "null");
        } 
        else if (isValidNameForB) {
            // 组合B要求年龄字符串严格等于 "null"
            isAgeValid = (age === "null");
        }
        
        if (!isAgeValid) {
            ageField.classList.add('error-active');
            ageError.style.display = 'block';
            return;
        }
        
        // 第三步: 根据姓名校验民族
        let isNationValid = false;
        if (isValidNameForA) {
            isNationValid = (nation === "动物");
        } 
        else if (isValidNameForB) {
            isNationValid = (nation === "None族");
        }
        
        if (!isNationValid) {
            nationField.classList.add('error-active');
            nationError.style.display = 'block';
            return;
        }
        
        // ----- 全部验证通过，确定要展示的照片 -----
        let targetPhoto = "";
        if (isValidNameForA) {
            if (name === "鸡") targetPhoto = PHOTO_CHICKEN;
            else if (name === "狗") targetPhoto = PHOTO_DOG;
            else if (name === "鸟") targetPhoto = PHOTO_BIRD;
        } else if (isValidNameForB) {
            targetPhoto = PHOTO_NULL_IDENTITY;
        }
        
        // 切换到预览页面并启动加载动画
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('preview-page').style.display = 'flex';
        startPreview(targetPhoto);
    }
    
    // ---------- 7. 预览页进度条与照片展示 (含重新生成功能) ----------
    let progressInterval = null;
    const loadingBox = document.getElementById('loading-box');
    const resultPhoto = document.getElementById('result-photo');
    const loaderBar = document.getElementById('loaderBar');
    const statusText = document.getElementById('status-text');
    const regenerateBtn = document.getElementById('regenerateBtn');
    
    function resetPreview() {
        if (progressInterval) {
            clearInterval(progressInterval);
            progressInterval = null;
        }
        loaderBar.style.width = '0%';
        statusText.innerHTML = "正在分析...";
        loadingBox.style.display = 'block';
        resultPhoto.style.display = 'none';
        resultPhoto.style.opacity = 0;
        resultPhoto.src = '';
    }
    
    function finishLoading(photoUrl) {
        if (progressInterval) {
            clearInterval(progressInterval);
            progressInterval = null;
        }
        loaderBar.style.width = '100%';
        statusText.innerHTML = "生成完毕！";
        
        setTimeout(() => {
            loadingBox.style.display = 'none';
            resultPhoto.src = photoUrl;
            resultPhoto.style.display = 'block';
            let opacity = 0;
            const fadeInterval = setInterval(() => {
                if (opacity < 1) {
                    opacity += 0.05;
                    resultPhoto.style.opacity = opacity;
                } else {
                    clearInterval(fadeInterval);
                }
            }, 100);
        }, 500);
    }
    
    function startPreview(finalPhotoUrl) {
        resetPreview();
        let width = 0;
        progressInterval = setInterval(() => {
            if (width < 90) {
                width += Math.random() * 5;
                if (width > 90) width = 90;
                loaderBar.style.width = width + '%';
            } else {
                clearInterval(progressInterval);
                progressInterval = null;
                statusText.innerHTML = "正在分析...";
                setTimeout(() => {
                    finishLoading(finalPhotoUrl);
                }, 4000);
            }
        }, 100);
    }
    
    // 重新生成: 返回登录页面，重置预览状态，不清空表单内容（保留用户上次输入）
    function backToForm() {
        // 停止所有计时器
        if (progressInterval) {
            clearInterval(progressInterval);
            progressInterval = null;
        }
        // 重置预览界面显示
        resetPreview();
        // 切换页面
        document.getElementById('preview-page').style.display = 'none';
        document.getElementById('login-page').style.display = 'flex';
        // 可选: 清除所有错误高亮 (用户重新提交时会重新验证，不清除也无伤大雅)
        const nameField = nameInput;
        const ageField = ageInput;
        const nationField = nationSelect;
        [nameField, ageField, nationField].forEach(el => el.classList.remove('error-active'));
        document.getElementById('nameError').style.display = 'none';
        document.getElementById('ageError').style.display = 'none';
        document.getElementById('nationError').style.display = 'none';
    }
    
    // 绑定确认按钮
    const confirmBtn = document.getElementById('confirmBtn');
    confirmBtn.addEventListener('click', validateAndSubmit);
    
    // 绑定重新生成按钮
    regenerateBtn.addEventListener('click', backToForm);
    
    // 可选: 年龄输入框支持直接回车提交 (提升体验)
    ageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && document.getElementById('login-page').style.display !== 'none') {
            validateAndSubmit();
        }
    });
    nameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && document.getElementById('login-page').style.display !== 'none') {
            validateAndSubmit();
        }
    });
    nationSelect.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && document.getElementById('login-page').style.display !== 'none') {
            validateAndSubmit();
        }
    });
</script>
</body>
</html>
